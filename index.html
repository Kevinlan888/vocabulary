<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary Cards</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --card-front: #1e2233;
    --card-back: #252a3a;
    --text: #e8eaed;
    --text-dim: #8b8fa3;
    --accent: #6c8cff;
    --a2: #4caf50; --b1: #2196f3; --b2: #ff9800; --c1: #f44336; --c2: #9c27b0;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    padding: 2rem 2rem 1rem;
    max-width: 1200px;
    margin: 0 auto;
  }

  header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
  }

  header p {
    color: var(--text-dim);
    font-size: 0.95rem;
  }

  .stats {
    display: flex;
    gap: 1.5rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }

  .stats span {
    font-size: 0.85rem;
    color: var(--text-dim);
  }

  .stats strong {
    color: var(--accent);
  }

  .filters {
    padding: 1rem 2rem;
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid transparent;
    color: var(--text-dim);
    padding: 0.4rem 1rem;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
  }

  .filter-btn:hover { color: var(--text); border-color: #333; }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .search-box {
    padding: 0 2rem;
    max-width: 1200px;
    margin: 0 auto 1rem;
  }

  .search-box input {
    width: 100%;
    max-width: 400px;
    background: var(--surface);
    border: 1px solid #2a2d3a;
    color: var(--text);
    padding: 0.6rem 1rem;
    border-radius: 8px;
    font-size: 0.9rem;
    outline: none;
    transition: border 0.2s;
  }

  .search-box input:focus { border-color: var(--accent); }
  .search-box input::placeholder { color: var(--text-dim); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
    padding: 0 2rem 3rem;
    max-width: 1200px;
    margin: 0 auto;
  }

  .card-container {
    perspective: 800px;
    height: 240px;
    cursor: pointer;
  }

  .card {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    transform-style: preserve-3d;
  }

  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 12px;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .card-front {
    background: var(--card-front);
    border: 1px solid #2a2d3a;
  }

  .card-back {
    background: var(--card-back);
    border: 1px solid #2a2d3a;
    transform: rotateY(180deg);
  }

  .back-content {
    flex: 1;
    overflow-y: auto;
    padding-bottom: 2rem;
  }

  .back-content::-webkit-scrollbar { width: 3px; }
  .back-content::-webkit-scrollbar-thumb { background: #3a3d4a; border-radius: 3px; }

  .cefr-badge {
    display: inline-block;
    padding: 0.15rem 0.6rem;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 700;
    color: #fff;
    width: fit-content;
    margin-bottom: 0.8rem;
  }

  .cefr-a1 { background: #4caf50; }
  .cefr-a2 { background: #66bb6a; }
  .cefr-b1 { background: #2196f3; }
  .cefr-b2 { background: #ff9800; }
  .cefr-c1 { background: #f44336; }
  .cefr-c2 { background: #9c27b0; }

  .word-title {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
    letter-spacing: -0.02em;
  }

  .pronunciation {
    color: var(--text-dim);
    font-size: 0.9rem;
    margin-bottom: 0.6rem;
  }

  .pos-tags {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    margin-top: auto;
  }

  .pos-tag {
    background: rgba(108, 140, 255, 0.12);
    color: var(--accent);
    padding: 0.2rem 0.6rem;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: 500;
  }

  .hint {
    position: absolute;
    bottom: 0.8rem;
    right: 1rem;
    color: var(--text-dim);
    font-size: 0.7rem;
    opacity: 0.5;
  }

  /* Back side */
  .entry {
    margin-bottom: 0.8rem;
  }

  .entry:last-child { margin-bottom: 0; }

  .entry-pos {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 0.2rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .entry-def {
    font-size: 0.88rem;
    line-height: 1.4;
    margin-bottom: 0.3rem;
  }

  .entry-example {
    font-size: 0.8rem;
    color: var(--text-dim);
    font-style: italic;
    line-height: 1.4;
  }

  .back-hint {
    position: absolute;
    bottom: 0.8rem;
    right: 1rem;
    color: var(--text-dim);
    font-size: 0.7rem;
    opacity: 0.5;
  }

  .detail-btn {
    position: absolute;
    bottom: 0.6rem;
    left: 1rem;
    background: rgba(108, 140, 255, 0.15);
    border: 1px solid rgba(108, 140, 255, 0.3);
    color: var(--accent);
    padding: 0.25rem 0.6rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.7rem;
    font-weight: 500;
    transition: all 0.2s;
    z-index: 5;
    flex-shrink: 0;
  }

  .detail-btn:hover {
    background: rgba(108, 140, 255, 0.3);
    border-color: var(--accent);
  }

  .card-back-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 0.6rem 1rem;
    background: linear-gradient(transparent, var(--card-back) 40%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    pointer-events: none;
  }

  .card-back-bottom .detail-btn,
  .card-back-bottom .back-hint {
    pointer-events: auto;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }

  .modal-overlay.active {
    opacity: 1;
    pointer-events: auto;
  }

  .modal {
    background: var(--surface);
    border: 1px solid #2a2d3a;
    border-radius: 16px;
    padding: 2rem;
    max-width: 520px;
    width: 90%;
    max-height: 85vh;
    overflow-y: auto;
    transform: translateY(20px) scale(0.95);
    transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    scrollbar-width: thin;
    scrollbar-color: #3a3d4a transparent;
  }

  .modal::-webkit-scrollbar { width: 5px; }
  .modal::-webkit-scrollbar-track { background: transparent; }
  .modal::-webkit-scrollbar-thumb { background: #3a3d4a; border-radius: 10px; }
  .modal::-webkit-scrollbar-thumb:hover { background: #4a4d5a; }

  .modal-overlay.active .modal {
    transform: translateY(0) scale(1);
  }

  .modal-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 1.2rem;
  }

  .modal-title {
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .modal-pron {
    color: var(--text-dim);
    font-size: 0.95rem;
    margin-top: 0.15rem;
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 1.4rem;
    cursor: pointer;
    padding: 0.2rem;
    line-height: 1;
    transition: color 0.2s;
  }

  .modal-close:hover { color: var(--text); }

  .modal-section {
    margin-bottom: 1.2rem;
  }

  .modal-section:last-child { margin-bottom: 0; }

  .modal-section-title {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.4rem;
  }

  .modal-entry {
    background: rgba(255,255,255,0.03);
    border-radius: 8px;
    padding: 0.8rem 1rem;
    margin-bottom: 0.6rem;
  }

  .modal-entry-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.3rem;
  }

  .modal-entry-pos {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .modal-entry-trans {
    font-size: 0.7rem;
    color: var(--text-dim);
    background: rgba(255,255,255,0.05);
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
  }

  .modal-entry-def {
    font-size: 0.9rem;
    line-height: 1.5;
    margin-bottom: 0.3rem;
  }

  .modal-entry-example {
    font-size: 0.82rem;
    color: var(--text-dim);
    font-style: italic;
    line-height: 1.4;
    border-left: 2px solid var(--accent);
    padding-left: 0.6rem;
    margin-bottom: 0.4rem;
  }

  .modal-verb-forms {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 0.15rem 0.8rem;
    font-size: 0.8rem;
    margin-top: 0.3rem;
  }

  .modal-verb-forms dt {
    color: var(--text-dim);
  }

  .modal-verb-forms dd {
    color: var(--text);
  }

  .modal-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
  }

  .modal-chip {
    background: rgba(108, 140, 255, 0.1);
    color: var(--accent);
    padding: 0.2rem 0.6rem;
    border-radius: 4px;
    font-size: 0.8rem;
  }

  .modal-chip.antonym {
    background: rgba(244, 67, 54, 0.1);
    color: #ef5350;
  }

  .modal-chip.family {
    background: rgba(76, 175, 80, 0.1);
    color: #66bb6a;
  }

  .loading {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-dim);
  }

  .empty {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-dim);
    grid-column: 1 / -1;
  }

  @media (max-width: 600px) {
    header { padding: 1.5rem 1rem 0.5rem; }
    .filters { padding: 0.5rem 1rem; }
    .search-box { padding: 0 1rem; }
    .grid { padding: 0 1rem 2rem; gap: 0.75rem; }
    .card-container { height: 220px; }
  }
</style>
</head>
<body>

<header>
  <h1>Vocabulary Cards</h1>
  <p>Click a card to flip and reveal the definition</p>
  <div class="stats" id="stats"></div>
</header>

<div class="search-box">
  <input type="text" id="search" placeholder="Search words..." />
</div>

<div class="filters" id="filters"></div>

<div class="grid" id="grid">
  <div class="loading">Loading vocabulary...</div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<script>
let allWords = [];
let wordDetails = {};
let activeFilter = 'all';

const grid = document.getElementById('grid');
const statsEl = document.getElementById('stats');
const filtersEl = document.getElementById('filters');
const searchInput = document.getElementById('search');

async function init() {
  try {
    const res = await fetch('./words/index.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    allWords = await res.json();
    if (!Array.isArray(allWords) || allWords.length === 0) {
      grid.innerHTML = '<div class="empty">No vocabulary data found.</div>';
      return;
    }
    renderFilters();
    renderStats();
    renderCards();
  } catch (e) {
    console.error('Failed to load vocabulary:', e);
    grid.innerHTML = '<div class="empty">Failed to load vocabulary data. Make sure you are running a local server (e.g. <code>python -m http.server</code>).</div>';
  }
}

function renderStats() {
  const total = allWords.length;
  const levels = {};
  allWords.forEach(w => { levels[w.cefrLevel] = (levels[w.cefrLevel] || 0) + 1; });
  statsEl.innerHTML = `<span>Total: <strong>${total}</strong> words</span>` +
    Object.entries(levels).sort().map(([l, c]) => `<span>${l}: <strong>${c}</strong></span>`).join('');
}

function renderFilters() {
  const levels = [...new Set(allWords.map(w => w.cefrLevel))].sort();
  const filters = ['all', ...levels];
  filtersEl.innerHTML = filters.map(f =>
    `<button class="filter-btn${f === activeFilter ? ' active' : ''}" data-level="${f}">${f.toUpperCase()}</button>`
  ).join('');
  filtersEl.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeFilter = btn.dataset.level;
      filtersEl.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderCards();
    });
  });
}

function getFilteredWords() {
  let words = allWords;
  if (activeFilter !== 'all') {
    words = words.filter(w => w.cefrLevel === activeFilter);
  }
  const q = searchInput.value.trim().toLowerCase();
  if (q) {
    words = words.filter(w => w.word.toLowerCase().includes(q));
  }
  return words;
}

function renderCards() {
  const words = getFilteredWords();
  if (words.length === 0) {
    grid.innerHTML = '<div class="empty">No words found.</div>';
    return;
  }
  grid.innerHTML = words.map(w => `
    <div class="card-container" data-word="${w.word}" data-file="${w.file}">
      <div class="card">
        <div class="card-face card-front">
          <span class="cefr-badge cefr-${w.cefrLevel.toLowerCase()}">${w.cefrLevel}</span>
          <div class="word-title">${w.word}</div>
          <div class="pronunciation">${w.pronunciation}</div>
          <div class="pos-tags">
            ${w.partOfSpeech.map(p => `<span class="pos-tag">${p}</span>`).join('')}
          </div>
          <span class="hint">Click to flip</span>
        </div>
        <div class="card-face card-back">
          <div class="back-content" data-loaded="false">Loading...</div>
          <div class="card-back-bottom">
            <button class="detail-btn" data-word="${w.word}">More details</button>
            <span class="back-hint">Click to flip back</span>
          </div>
        </div>
      </div>
    </div>
  `).join('');

  grid.querySelectorAll('.card-container').forEach(container => {
    const card = container.querySelector('.card');
    card.addEventListener('click', async (e) => {
      if (e.target.closest('.detail-btn')) {
        e.stopPropagation();
        const word = e.target.dataset.word;
        await openModal(word, container.dataset.file);
        return;
      }
      const isFlipping = !card.classList.contains('flipped');
      card.classList.toggle('flipped');
      if (isFlipping) {
        const backContent = card.querySelector('.back-content');
        if (backContent.dataset.loaded === 'false') {
          await loadDetail(container, backContent);
        }
      }
    });
  });
}

async function loadDetail(container, backContent) {
  const file = container.dataset.file;
  const word = container.dataset.word;

  if (wordDetails[word]) {
    backContent.innerHTML = renderDetail(wordDetails[word]);
    backContent.dataset.loaded = 'true';
    return;
  }

  try {
    const res = await fetch(`./words/${file}`);
    const data = await res.json();
    wordDetails[word] = data;
    backContent.innerHTML = renderDetail(data);
    backContent.dataset.loaded = 'true';
  } catch (e) {
    backContent.innerHTML = '<div style="color:#f44336">Failed to load</div>';
  }
}

function renderDetail(data) {
  return data.entries.map(e => `
    <div class="entry">
      <div class="entry-pos">${e.partOfSpeech}${e.transitivity ? ' · ' + e.transitivity : ''}</div>
      <div class="entry-def">${e.definition}</div>
      <div class="entry-example">"${e.exampleSentence}"</div>
    </div>
  `).join('');
}

const modalOverlay = document.getElementById('modalOverlay');
const modalContent = document.getElementById('modalContent');

modalOverlay.addEventListener('click', (e) => {
  if (e.target === modalOverlay) closeModal();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

async function openModal(word, file) {
  let data = wordDetails[word];
  if (!data) {
    try {
      const res = await fetch(`./words/${file}`);
      data = await res.json();
      wordDetails[word] = data;
    } catch (e) {
      return;
    }
  }

  const entriesHtml = data.entries.map(e => `
    <div class="modal-entry">
      <div class="modal-entry-header">
        <span class="modal-entry-pos">${e.partOfSpeech}</span>
        ${e.transitivity ? `<span class="modal-entry-trans">${e.transitivity}</span>` : ''}
      </div>
      <div class="modal-entry-def">${e.definition}</div>
      <div class="modal-entry-example">${e.exampleSentence}</div>
      ${e.verbForms ? `
        <dl class="modal-verb-forms">
          <dt>Base</dt><dd>${e.verbForms.base}</dd>
          <dt>Past</dt><dd>${e.verbForms.past}</dd>
          <dt>Past Participle</dt><dd>${e.verbForms.pastParticiple}</dd>
          <dt>Present Participle</dt><dd>${e.verbForms.presentParticiple}</dd>
          <dt>3rd Person</dt><dd>${e.verbForms.thirdPersonSingular}</dd>
        </dl>
      ` : ''}
      ${e.collocations && e.collocations.length ? `
        <div style="margin-top:0.3rem;">
          <div class="modal-section-title" style="margin-bottom:0.2rem;">Collocations</div>
          <div class="modal-chips">${e.collocations.map(c => `<span class="modal-chip">${c}</span>`).join('')}</div>
        </div>
      ` : ''}
    </div>
  `).join('');

  const hasSynonyms = data.entries.some(e => e.synonyms && e.synonyms.length);
  const hasAntonyms = data.entries.some(e => e.antonyms && e.antonyms.length);
  const allSynonyms = [...new Set(data.entries.flatMap(e => e.synonyms || []))];
  const allAntonyms = [...new Set(data.entries.flatMap(e => e.antonyms || []))];

  modalContent.innerHTML = `
    <div class="modal-header">
      <div>
        <div class="modal-title">${data.word}</div>
        <div class="modal-pron">${data.pronunciation} · <span class="cefr-badge cefr-${data.cefrLevel.toLowerCase()}" style="font-size:0.65rem;padding:0.1rem 0.45rem;">${data.cefrLevel}</span></div>
      </div>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Definitions</div>
      ${entriesHtml}
    </div>
    ${allSynonyms.length ? `
      <div class="modal-section">
        <div class="modal-section-title">Synonyms</div>
        <div class="modal-chips">${allSynonyms.map(s => `<span class="modal-chip">${s}</span>`).join('')}</div>
      </div>
    ` : ''}
    ${allAntonyms.length ? `
      <div class="modal-section">
        <div class="modal-section-title">Antonyms</div>
        <div class="modal-chips">${allAntonyms.map(a => `<span class="modal-chip antonym">${a}</span>`).join('')}</div>
      </div>
    ` : ''}
    ${data.wordFamily && data.wordFamily.length ? `
      <div class="modal-section">
        <div class="modal-section-title">Word Family</div>
        <div class="modal-chips">${data.wordFamily.map(w => `<span class="modal-chip family">${w}</span>`).join('')}</div>
      </div>
    ` : ''}
  `;

  modalOverlay.classList.add('active');
}

function closeModal() {
  modalOverlay.classList.remove('active');
}

searchInput.addEventListener('input', renderCards);

init();
</script>
</body>
</html>
